name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[mcp]' bandit coverage ruff pip-audit
      - run: python -m compileall -q src tests benchmarks
      - run: ruff check src tests benchmarks
      - run: bandit -q -r src/bk --severity-level medium
      - run: PYTHONPATH=src python benchmarks/scheduler_queue.py --days 1
      - run: coverage run -m unittest discover -s tests -p 'test_*.py'
      - run: coverage combine
      - run: coverage report
      - run: pip-audit

  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -p 'test_*.py'

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install '.[mcp]'
      - run: python -m unittest tests.test_mcp_server tests.test_mcp_integration

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install build check-wheel-contents twine validate-pyproject
      - run: validate-pyproject pyproject.toml
      - run: python -m build
      - run: python -m twine check dist/*
      - run: check-wheel-contents dist/*.whl
      - name: Verify bundled skill
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          required = {
              "bk/data/codex-skill/gpubk/SKILL.md",
              "bk/data/codex-skill/gpubk/agents/openai.yaml",
              "bk/data/codex-skill/gpubk/references/protocol.md",
          }
          missing = required - names
          if missing:
              raise SystemExit(f"wheel missing skill files: {sorted(missing)}")
          PY
      - name: Smoke-test zero-dependency wheel
        run: |
          python -m venv /tmp/bk-wheel-smoke
          /tmp/bk-wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          BK_DATA_DIR=/tmp/bk-wheel-data BK_GPU_COUNT=2 /tmp/bk-wheel-smoke/bin/bk --version
          BK_DATA_DIR=/tmp/bk-wheel-data BK_GPU_COUNT=2 /tmp/bk-wheel-smoke/bin/bk agent context --compact > /tmp/bk-context.json
          /tmp/bk-wheel-smoke/bin/bk skill install --target /tmp/bk-wheel-skill
          /tmp/bk-wheel-smoke/bin/bk service show worker | grep -- "-m bk worker"
