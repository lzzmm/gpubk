name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade 'pip>=26.1.2'
      - run: >-
          python -m pip install -e '.[mcp]'
          bandit build check-wheel-contents packaging pip-audit ruff twine validate-pyproject
      - run: python -m compileall -q src tests benchmarks
      - run: ruff check src tests benchmarks
      - run: bandit -q -r src/bk --severity-level medium
      - run: PYTHONPATH=src python benchmarks/scheduler_queue.py --days 1
      - run: PYTHONPATH=src python benchmarks/usage_store.py --days 1
      - run: python -m unittest discover -s tests -p 'test_*.py'
      - run: pip-audit
      - run: validate-pyproject pyproject.toml
      - name: Verify tag matches package version
        id: package
        shell: bash
        run: |
          version=$(PYTHONPATH=src python -c 'from bk import __version__; print(__version__)')
          prerelease=$(PYTHONPATH=src python -c 'from bk import __version__; from packaging.version import Version; print(str(Version(__version__).is_prerelease).lower())')
          base_version=$(PYTHONPATH=src python -c 'from bk import __version__; from packaging.version import Version; print(Version(__version__).base_version)')
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
              echo "tag $GITHUB_REF_NAME does not match package version $version" >&2
              exit 1
            fi
            if [[ "$prerelease" == "true" ]]; then
              echo "tag releases require a final version, not $version" >&2
              exit 1
            fi
            if [[ "$(git cat-file -t "$GITHUB_REF")" != "tag" ]]; then
              echo "production releases require an annotated tag" >&2
              exit 1
            fi
            git fetch --no-tags --force origin main:refs/remotes/origin/main
            tagged_commit=$(git rev-parse "${GITHUB_REF}^{commit}")
            main_commit=$(git rev-parse "refs/remotes/origin/main^{commit}")
            if [[ "$tagged_commit" != "$main_commit" ]]; then
              echo "tagged commit must equal the current origin/main tip" >&2
              exit 1
            fi
            escaped_version=${version//./\\.}
            if ! grep -Eq "^## $escaped_version - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
              echo "CHANGELOG.md needs a dated heading for $version" >&2
              exit 1
            fi
          else
            if [[ "$prerelease" != "true" ]]; then
              echo "manual Release dispatch requires a prerelease version" >&2
              exit 1
            fi
            if ! grep -Fqx "## $base_version - Unreleased" CHANGELOG.md; then
              echo "CHANGELOG.md needs an Unreleased heading for $base_version" >&2
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: python -m build
      - run: python -m twine check dist/*
      - run: check-wheel-contents dist/*.whl
      - name: Smoke-test built wheel
        shell: bash
        run: |
          python -m venv /tmp/gpubk-release-smoke
          /tmp/gpubk-release-smoke/bin/python -m pip install --no-deps dist/*.whl
          test "$(/tmp/gpubk-release-smoke/bin/bk --version)" = "bk ${{ steps.package.outputs.version }}"
          BK_DATA_DIR=/tmp/gpubk-release-data BK_GPU_COUNT=2 \
            /tmp/gpubk-release-smoke/bin/bk agent context --compact > /tmp/gpubk-release-context.json
          test ! -e /tmp/gpubk-release-data
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  preflight-testpypi:
    if: vars.TESTPYPI_RELEASE_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Require an unused TestPyPI version
        env:
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          status=$(curl --retry 3 --retry-all-errors --silent --show-error \
            --output /dev/null --write-out '%{http_code}' \
            "https://test.pypi.org/pypi/gpubk/$VERSION/json")
          case "$status" in
            404) ;;
            200)
              echo "gpubk $VERSION already exists on TestPyPI" >&2
              exit 1
              ;;
            *)
              echo "TestPyPI version check returned HTTP $status" >&2
              exit 1
              ;;
          esac

  publish-testpypi:
    if: vars.TESTPYPI_RELEASE_ENABLED == 'true'
    needs: [build, preflight-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gpubk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    steps:
      - name: Install the uploaded package
        shell: bash
        run: |
          python -m venv /tmp/gpubk-index-smoke
          installed=false
          for attempt in {1..12}; do
            if /tmp/gpubk-index-smoke/bin/python -m pip install --no-cache-dir --no-deps \
              --index-url https://test.pypi.org/simple/ "gpubk==${{ needs.build.outputs.version }}"; then
              installed=true
              break
            fi
            sleep 10
          done
          test "$installed" = true
          test "$(/tmp/gpubk-index-smoke/bin/bk --version)" = "bk ${{ needs.build.outputs.version }}"

  preflight-pypi:
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      vars.PYPI_RELEASE_ENABLED == 'true'
    needs: [build, verify-testpypi]
    runs-on: ubuntu-latest
    steps:
      - name: Require an unused PyPI version
        env:
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          status=$(curl --retry 3 --retry-all-errors --silent --show-error \
            --output /dev/null --write-out '%{http_code}' \
            "https://pypi.org/pypi/gpubk/$VERSION/json")
          case "$status" in
            404) ;;
            200)
              echo "gpubk $VERSION already exists on PyPI" >&2
              exit 1
              ;;
            *)
              echo "PyPI version check returned HTTP $status" >&2
              exit 1
              ;;
          esac

  publish-pypi:
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      vars.PYPI_RELEASE_ENABLED == 'true'
    needs: [build, verify-testpypi, preflight-pypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gpubk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  verify-pypi:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Install the uploaded package
        shell: bash
        run: |
          python -m venv /tmp/gpubk-index-smoke
          installed=false
          for attempt in {1..12}; do
            if /tmp/gpubk-index-smoke/bin/python -m pip install --no-cache-dir --no-deps \
              "gpubk==${{ needs.build.outputs.version }}"; then
              installed=true
              break
            fi
            sleep 10
          done
          test "$installed" = true
          test "$(/tmp/gpubk-index-smoke/bin/bk --version)" = "bk ${{ needs.build.outputs.version }}"
